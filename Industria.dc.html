  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:flex; flex-direction:column; gap:14px;\">\n        <sc-for list=\"{{ lanes }}\" as=\"l\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ l.onSel }}\" onfocus=\"{{ l.onSel }}\" style=\"{{ l.style }}\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px;\">\n              <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:18px; color:#eef2f6;\">{{ l.name }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8aa0b8;\">{{ l.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:10px; margin:14px 0;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#9aa7b6; white-space:nowrap;\">{{ t.youLabel }}<\u002Fspan>\n              <span style=\"{{ l.connectorStyle }}\"><\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#9aa7b6; white-space:nowrap;\">{{ t.techLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.5; color:#9aa0ac; font-weight:300;\">{{ l.desc }}<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- meters -->\n      <div style=\"border:1px solid rgba(220,225,232,0.1); border-radius:10px; background:rgba(13,18,28,0.62); padding:clamp(24px,3vw,32px);\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:20px; color:#eef2f6; margin-bottom:4px;\">{{ sel.name }}<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#8aa0b8; margin-bottom:24px;\">{{ t.tradeoff }}<\u002Fdiv>\n        <sc-for list=\"{{ sel.meters }}\" as=\"m\" hint-placeholder-count=\"3\">\n          <div style=\"margin-bottom:20px;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;\">\n              <span style=\"font-size:13.5px; color:#c4cbd4; font-weight:300;\">{{ m.label }}<\u002Fspan>\n              <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:{{ m.color }};\">{{ m.pct }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:7px; border-radius:999px; background:rgba(150,165,185,0.12); overflow:hidden;\">\n              <div style=\"height:100%; width:{{ m.w }}; border-radius:999px; background:{{ m.color }}; transition:width .8s cubic-bezier(.4,0,.2,1);\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"margin-top:24px; padding-top:20px; border-top:1px solid rgba(220,225,232,0.08); font-size:13.5px; line-height:1.55; color:#8893a3; font-weight:300;\">{{ sel.note }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid rgba(220,225,232,0.06);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:40px clamp(24px,5vw,64px); display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:18px;\">\n      <div style=\"display:flex; align-items:baseline; gap:8px;\">\n        <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; color:#e8eaed;\">4Helix<\u002Fspan>\n        <span style=\"font-size:13px; color:#888e9a;\">Ventures<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.08em; color:#5d636e;\">{{ t.footerNote }}<\u002Fdiv>\n      <div style=\"font-size:12px; color:#5d636e;\">© {{ year }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;es&quot;,&quot;en&quot;],&quot;default&quot;:&quot;es&quot;,&quot;tsType&quot;:&quot;'es'|'en'&quot;}}\">\nconst NAV = {\n  es: [\n    { label: 'Inicio', href: '4Helix Ventures.dc.html', key: 'home' },\n    { label: 'Modelo', href: 'Modelo.dc.html', key: 'modelo' },\n    { label: 'Método', href: 'Metodo.dc.html', key: 'metodo' },\n    { label: 'Contacto', href: '4Helix Ventures.dc.html#contacto', key: 'contacto' }\n  ],\n  en: [\n    { label: 'Home', href: '4Helix Ventures.dc.html', key: 'home' },\n    { label: 'Model', href: 'Modelo.dc.html', key: 'modelo' },\n    { label: 'Method', href: 'Metodo.dc.html', key: 'metodo' },\n    { label: 'Contact', href: '4Helix Ventures.dc.html#contacto', key: 'contacto' }\n  ]\n};\nfunction fhReadLang(fb) { try { return localStorage.getItem('fh_lang') || fb; } catch (e) { return fb; } }\nfunction fhWriteLang(l) { try { localStorage.setItem('fh_lang', l); } catch (e) {} }\nfunction fhNavItems(lang, page) {\n  return NAV[lang].map(function (it) {\n    const active = it.key === page;\n    return Object.assign({}, it, { style: { fontSize: '14px', letterSpacing: '0.01em', paddingBottom: '4px', color: active ? '#e8eaed' : '#9aa0ac', borderBottom: active ? '1.5px solid #5fd3c8' : '1.5px solid transparent', transition: 'color .2s' } });\n  });\n}\nconst HELICES = [\n  { key: 'ciencia', href: 'Ciencia.dc.html', es: 'Ciencia', en: 'Science', rgb: '95,211,200' },\n  { key: 'industria', href: 'Industria.dc.html', es: 'Industria', en: 'Industry', rgb: '230,192,116' },\n  { key: 'capital', href: 'Capital.dc.html', es: 'Capital', en: 'Capital', rgb: '136,176,238' },\n  { key: 'eje', href: 'Eje.dc.html', es: 'El eje', en: 'The axis', rgb: '232,165,157' }\n];\nconst MET = { control: '95,211,200', velocidad: '230,192,116', inversion: '136,176,238' };\n\nconst ICOPY = {\n  es: {\n    position: 'Posición en la hélice', seeModel: 'Ver el modelo',\n    eyebrow: 'Hélice 02 · Industria',\n    title: 'Para empresas: ¿cómo colaborar con la ciencia?',\n    intro: 'Aportas mercado, escala y validación real. Hay tres vías para colaborar con una tecnología de frontera — cada una con su equilibrio entre control, velocidad e inversión.',\n    aportaLabel: 'Qué aportas', ganaLabel: 'Qué ganas',\n    aporta: ['Mercado, canales y clientes', 'Escala y capacidad de producción', 'Validación real de la tecnología'],\n    gana: ['Acceso a tecnología de frontera', 'Talento científico de primer nivel', 'Ventaja competitiva difícil de copiar'],\n    toolEyebrow: 'Vías de colaboración',\n    toolTitle: 'Tres formas de trabajar juntos',\n    toolIntro: 'Elige una vía y compara su equilibrio. No hay una mejor: depende de cuánto control quieras, con qué rapidez necesitas el resultado y cuánto puedes invertir.',\n    youLabel: 'Tu empresa', techLabel: 'Tecnología 4Helix',\n    tradeoff: 'Equilibrio de la vía',\n    meterLabels: { control: 'Control', velocidad: 'Velocidad', inversion: 'Inversión' },\n    lanes: [\n      { name: 'Co-desarrollo', tag: '01', desc: 'Construís la tecnología juntos desde el principio, compartiendo riesgo y propiedad.', control: 60, velocidad: 40, inversion: 70, note: 'Máxima alineación y aprendizaje conjunto, a cambio del compromiso y el tiempo de ambas partes.' },\n      { name: 'Licencia', tag: '02', desc: 'Licenciáis una tecnología ya desarrollada y la explotáis en vuestro mercado.', control: 35, velocidad: 85, inversion: 35, note: 'La vía más rápida y ligera, pero con menos control sobre la evolución técnica.' },\n      { name: 'Integración', tag: '03', desc: 'Integráis la spin-off o su producto en vuestra operación (M&A o joint venture).', control: 90, velocidad: 55, inversion: 90, note: 'Control total y captura de valor a largo plazo, a cambio de la mayor inversión.' }\n    ],\n    footerNote: '4Helix Ventures · nombre de trabajo · pendiente de registro de marca'\n  },\n  en: {\n    position: 'Position in the helix', seeModel: 'See the model',\n    eyebrow: 'Helix 02 · Industry',\n    title: 'For companies: how to collaborate with science?',\n    intro: 'You bring market, scale and real validation. There are three ways to work with a frontier technology — each with its own balance of control, speed and investment.',\n    aportaLabel: 'What you give', ganaLabel: 'What you gain',\n    aporta: ['Market, channels and customers', 'Scale and production capacity', 'Real technology validation'],\n    gana: ['Access to frontier technology', 'Top-tier scientific talent', 'A hard-to-copy competitive edge'],\n    toolEyebrow: 'Collaboration paths',\n    toolTitle: 'Three ways to work together',\n    toolIntro: 'Pick a path and compare its balance. None is best: it depends on how much control you want, how fast you need the result and how much you can invest.',\n    youLabel: 'Your company', techLabel: '4Helix technology',\n    tradeoff: 'Path balance',\n    meterLabels: { control: 'Control', velocidad: 'Speed', inversion: 'Investment' },\n    lanes: [\n      { name: 'Co-development', tag: '01', desc: 'You build the technology together from the start, sharing risk and ownership.', control: 60, velocidad: 40, inversion: 70, note: 'Maximum alignment and shared learning, in exchange for commitment and time from both sides.' },\n      { name: 'License', tag: '02', desc: 'You license an already-developed technology and exploit it in your market.', control: 35, velocidad: 85, inversion: 35, note: 'The fastest, lightest route, but with less control over technical evolution.' },\n      { name: 'Integration', tag: '03', desc: 'You integrate the spin-off or its product into your operation (M&A or joint venture).', control: 90, velocidad: 55, inversion: 90, note: 'Full control and long-term value capture, in exchange for the largest investment.' }\n    ],\n    footerNote: '4Helix Ventures · working name · trademark pending'\n  }\n};\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = { lang: fhReadLang((props && props.defaultLang) || 'es'), sel: 0 };\n    this.bgCanvas = React.createRef();\n  }\n  componentDidMount() {\n    import('./fh-common.js').then((m) => { this._net = m.startNetwork(this.bgCanvas.current); }).catch(() => {});\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (!reduce) { if (this._rot) clearInterval(this._rot); let i = 0; this._rot = setInterval(() => { i = (i + 1) % 3; this.setState({ sel: i }); }, 3600); }\n  }\n  componentWillUnmount() { if (this._net) this._net.stop(); if (this._rot) clearInterval(this._rot); }\n  setLang(l) { fhWriteLang(l); this.setState({ lang: l }); }\n  selectLane(i) { if (this._rot) { clearInterval(this._rot); this._rot = null; } this.setState({ sel: i }); }\n\n  renderVals() {\n    const lang = this.state.lang;\n    const t = ICOPY[lang];\n    const sel = this.state.sel;\n    const isES = lang === 'es';\n    const baseBtn = { padding: '6px 14px', borderRadius: '999px', fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '12px', letterSpacing: '0.08em', cursor: 'pointer', border: 'none', background: 'transparent', color: '#7c828e', transition: 'all .2s' };\n    const activeBtn = Object.assign({}, baseBtn, { background: 'rgba(220,225,232,0.13)', color: '#eef0f2' });\n\n    const helixChips = HELICES.map(function (hx) {\n      const on = hx.key === 'industria';\n      return { label: isES ? hx.es : hx.en, href: hx.href, style: { fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '12px', letterSpacing: '0.04em', whiteSpace: 'nowrap', padding: '6px 13px', borderRadius: '999px', border: '1px solid ' + (on ? 'rgba(' + hx.rgb + ',0.7)' : 'rgba(220,225,232,0.14)'), color: on ? 'rgb(' + hx.rgb + ')' : '#9aa0ac', background: on ? 'rgba(' + hx.rgb + ',0.10)' : 'transparent' } };\n    });\n\n    const lanes = t.lanes.map((l, i) => {\n      const on = i === sel;\n      return {\n        name: l.name, tag: l.tag, desc: l.desc,\n        onSel: () => this.selectLane(i),\n        style: { display: 'block', width: '100%', textAlign: 'left', padding: '20px 22px', borderRadius: '10px', cursor: 'pointer', transition: 'all .25s', background: on ? 'rgba(22,28,38,0.92)' : 'rgba(13,18,28,0.5)', border: '1px solid ' + (on ? 'rgba(230,192,116,0.55)' : 'rgba(220,225,232,0.1)'), boxShadow: on ? '0 0 22px rgba(230,192,116,0.14)' : 'none', outline: 'none' },\n        connectorStyle: on\n          ? { flex: 1, height: '3px', borderRadius: '2px', background: 'repeating-linear-gradient(90deg, rgba(230,192,116,0.95) 0 7px, rgba(230,192,116,0) 7px 13px)', backgroundSize: '26px 100%', animation: 'laneFlow 0.9s linear infinite' }\n          : { flex: 1, height: '2px', borderRadius: '2px', background: 'rgba(150,165,185,0.25)' }\n      };\n    });\n\n    const l = t.lanes[sel];\n    const meterKeys = ['control', 'velocidad', 'inversion'];\n    const meters = meterKeys.map((k) => ({ label: t.meterLabels[k], pct: l[k] + '%', w: l[k] + '%', color: 'rgb(' + MET[k] + ')' }));\n\n    return {\n      t: t, year: '2026', nav: fhNavItems(lang, 'modelo'), bgCanvas: this.bgCanvas, helixChips: helixChips,\n      esBtnStyle: isES ? activeBtn : baseBtn, enBtnStyle: isES ? baseBtn : activeBtn,\n      setES: () => this.setLang('es'), setEN: () => this.setLang('en'),\n      lanes: lanes,\n      sel: { name: l.name, note: l.note, meters: meters }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
