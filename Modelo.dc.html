<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: #061322; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  @keyframes silverShine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
  @keyframes flowDash { to { stroke-dashoffset: -26; } }
  @keyframes floatPulse { 0%,100% { opacity:.5; } 50% { opacity:.9; } }
  @keyframes logoDraw { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes logoPulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
  .lg-stroke { stroke-dasharray: 100; stroke-dashoffset: 100; animation: logoDraw .55s ease forwards; }
  .ls1 { animation-delay: 0s; } .ls2 { animation-delay: .4s; } .ls3 { animation-delay: .8s; } .ls4 { animation-delay: 1.2s; }
  .lg-pulse { animation: logoPulse 2.6s ease-in-out infinite; }
  .lg-diag, .lg-curve { transition: transform .3s ease; }
  nav a:hover .lg-diag { transform: translate(1.1px,-1.1px); }
  nav a:hover .lg-curve { transform: translate(-1.1px,1.1px); }
  @media (prefers-reduced-motion: reduce) { .lg-stroke { animation: none; stroke-dashoffset: 0; } .lg-pulse { animation: none; } }
  @media (max-width: 880px) {
    [style*="minmax(0px, 1"] { grid-template-columns: 1fr !important; }
    [style*="0.94fr 1.06fr"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 600px) {
    [style*="1fr 1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
    nav > div { flex-wrap: wrap !important; row-gap: 12px !important; }
  }
  @media (max-width: 470px) {
    [style*="width: 400px"][style*="height: 400px"] { transform: scale(0.78); transform-origin: top center; margin-bottom: -84px !important; }
  }
  a { text-decoration: none; }
  button:focus-visible { outline: 2px solid #5fd3c8; outline-offset: 3px; }
</style>
</helmet>

<div style="font-family:'Hanken Grotesk',sans-serif; color:#e8eaed; position:relative; z-index:0; background:radial-gradient(125% 95% at 64% 24%, #1c4673 0%, #102c49 42%, #08182a 72%, #061322 100%); min-height:100vh; overflow-x:hidden;">

class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { lang: fhReadLang((props && props.defaultLang) || 'es'), selected: 'ciencia' };
    this.bgCanvas = React.createRef();
  }

  componentDidMount() {
    this.startBg();
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!reduce) {
      if (this._rot) clearInterval(this._rot);
      const order = ['ciencia', 'industria', 'capital', 'eje'];
      let i = 0;
      this._rot = setInterval(() => { i = (i + 1) % order.length; this.setState({ selected: order[i] }); }, 3400);
    }
  }

  componentWillUnmount() {
    if (this._bg) cancelAnimationFrame(this._bg.raf);
    if (this._bgResize) window.removeEventListener('resize', this._bgResize);
    if (this._rot) clearInterval(this._rot);
  }

  selectActor(id) {
    if (this._rot) { clearInterval(this._rot); this._rot = null; }
    this.setState({ selected: id });
  }

  setLang(l) { fhWriteLang(l); this.setState({ lang: l }); }

  startBg() {
    const canvas = this.bgCanvas.current;
    if (!canvas) return;
    if (this._bg) cancelAnimationFrame(this._bg.raf);
    const ctx = canvas.getContext('2d');
    const root = canvas.parentNode;
    let w = 0, h = 0, dpr = 1, nodes = [];
    const rand = (a, b) => a + Math.random() * (b - a);
    const MARGIN = 40, LINK = 150, COL = '94,168,232';
    const build = () => {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth; h = window.innerHeight;
      canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const target = Math.max(22, Math.min(58, Math.round((w * h) / 46000)));
      if (nodes.length !== target) {
        nodes = [];
        for (let i = 0; i < target; i++) nodes.push({ x: rand(0, w), y: rand(0, h), vx: rand(-1, 1), vy: rand(-1, 1), ph: rand(0, Math.PI * 2), sp: rand(0.35, 0.95) });
      }
    };
    build();
    const clearEls = () => root.querySelectorAll('h1,h2,h3,p,nav,footer,button,a,[data-bg-clear]');
    this._bg = { raf: 0, last: performance.now() };
    const maskAt = (x, y, rects) => {
      let m = 1;
      for (let i = 0; i < rects.length; i++) {
        const r = rects[i];
        const dx = Math.max(r.left - x, 0, x - r.right);
        const dy = Math.max(r.top - y, 0, y - r.bottom);
        const d = Math.sqrt(dx * dx + dy * dy);
        const k = d >= MARGIN ? 1 : d / MARGIN;
        if (k < m) m = k;
        if (m <= 0) return 0;
      }
      return m;
    };
    const draw = (now) => {
      const dt = Math.min(0.05, (now - this._bg.last) / 1000);
      this._bg.last = now;
      ctx.clearRect(0, 0, w, h);
      const els = clearEls();
      const rects = [];
      for (let i = 0; i < els.length; i++) {
        const b = els[i].getBoundingClientRect();
        if (b.width && b.height && b.bottom > -60 && b.top < h + 60) rects.push(b);
      }
      const t = now / 1000;
      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        n.x += n.vx * dt * 11; n.y += n.vy * dt * 11;
        if (n.x < -20) n.x = w + 20; else if (n.x > w + 20) n.x = -20;
        if (n.y < -20) n.y = h + 20; else if (n.y > h + 20) n.y = -20;
        n.m = maskAt(n.x, n.y, rects);
        n.pulse = 0.5 + 0.5 * Math.sin(t * n.sp + n.ph);
      }
      for (let i = 0; i < nodes.length; i++) {
        const A = nodes[i];
        if (A.m <= 0) continue;
        for (let j = i + 1; j < nodes.length; j++) {
          const B = nodes[j];
          if (B.m <= 0) continue;
          const dx = A.x - B.x, dy = A.y - B.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < LINK) {
            const al = (1 - d / LINK) * 0.13 * A.m * B.m;
            if (al < 0.002) continue;
            ctx.strokeStyle = 'rgba(' + COL + ',' + al.toFixed(3) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
          }
        }
      }
      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        if (n.m <= 0) continue;
        const al = (0.11 + 0.32 * n.pulse) * n.m;
        const r = 1.1 + 1.5 * n.pulse;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 4.2);
        g.addColorStop(0, 'rgba(' + COL + ',' + al.toFixed(3) + ')');
        g.addColorStop(1, 'rgba(' + COL + ',0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(n.x, n.y, r * 4.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(186,222,255,' + (al * 0.95).toFixed(3) + ')';
        ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2); ctx.fill();
      }
      this._bg.raf = requestAnimationFrame(draw);
    };
    this._bgResize = build;
    window.addEventListener('resize', build);
    draw(performance.now());
    this._bg.raf = requestAnimationFrame(draw);
  }

  buildWheelLinks(selected) {
    const P = { ciencia: [200, 50], industria: [330, 275], capital: [70, 275], eje: [200, 200] };
    const tri = [['ciencia', 'industria'], ['industria', 'capital'], ['capital', 'ciencia']];
    const spokes = [['eje', 'ciencia'], ['eje', 'industria'], ['eje', 'capital']];
    const cx = 200, cy = 200;
    const curve = function (aId, bId) {
      const a = P[aId], b = P[bId];
      const mx = (a[0] + b[0]) / 2, my = (a[1] + b[1]) / 2;
      const cpx = mx + (mx - cx) * 0.4, cpy = my + (my - cy) * 0.4;
      return 'M ' + a[0] + ' ' + a[1] + ' Q ' + cpx + ' ' + cpy + ' ' + b[0] + ' ' + b[1];
    };
    const line = function (aId, bId) { const a = P[aId], b = P[bId]; return 'M ' + a[0] + ' ' + a[1] + ' L ' + b[0] + ' ' + b[1]; };
    let s = '';
    spokes.forEach(function (e) {
      const hi = selected === 'eje' || selected === e[1];
      const col = hi ? RGB.eje : '150,170,195';
      const op = hi ? 0.85 : 0.16;
      const extra = hi ? ' stroke-dasharray="5 6" style="animation:flowDash 1s linear infinite"' : '';
      s += '<path d="' + line(e[0], e[1]) + '" fill="none" stroke="rgba(' + col + ',' + op + ')" stroke-width="' + (hi ? 2 : 1.2) + '"' + extra + '/>';
    });
    tri.forEach(function (e) {
      const hi = selected === e[0] || selected === e[1];
      const col = hi ? RGB[e[0]] : '150,170,195';
      const op = hi ? 0.95 : 0.2;
      const extra = hi ? ' stroke-dasharray="6 7" style="animation:flowDash 1s linear infinite"' : '';
      s += '<path d="' + curve(e[0], e[1]) + '" fill="none" stroke="rgba(' + col + ',' + op + ')" stroke-width="' + (hi ? 2.4 : 1.3) + '" stroke-linecap="round"' + extra + '/>';
    });
    return React.createElement('svg', { viewBox: '0 0 400 400', style: { position: 'absolute', inset: 0, width: '100%', height: '100%', overflow: 'visible', pointerEvents: 'none' }, dangerouslySetInnerHTML: { __html: s } });
  }

  renderVals() {
    const lang = this.state.lang;
    const t = MCOPY[lang];
    const selected = this.state.selected;
    const isES = lang === 'es';
    const baseBtn = { padding: '6px 14px', borderRadius: '999px', fontFamily: "'IBM Plex Mono', monospace", fontSize: '12px', letterSpacing: '0.08em', cursor: 'pointer', border: 'none', background: 'transparent', color: '#7c828e', transition: 'all .2s' };
    const activeBtn = Object.assign({}, baseBtn, { background: 'rgba(220,225,232,0.13)', color: '#eef0f2' });

    const P = { ciencia: [200, 50], industria: [330, 275], capital: [70, 275], eje: [200, 200] };
    const order = ['ciencia', 'industria', 'capital', 'eje'];
    const wheelNodes = order.map((id) => {
      const sel = id === selected;
      const a = t.actors[id];
      const isEje = id === 'eje';
      const sz = isEje ? 112 : 92;
      const pos = P[id];
      return {
        id: id,
        label: isEje ? t.center : a.name,
        sub: isEje ? t.centerSub : '',
        onSel: () => this.selectActor(id),
        subStyle: { fontFamily: "'IBM Plex Mono', monospace", fontSize: '9.5px', letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(232,165,157,0.9)', marginTop: '2px' },
        style: {
          position: 'absolute', left: pos[0] + 'px', top: pos[1] + 'px', width: sz + 'px', height: sz + 'px',
          transform: 'translate(-50%,-50%)', borderRadius: '50%', display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', gap: '0px', textAlign: 'center', padding: '6px',
          background: sel ? 'rgba(22,32,48,0.96)' : 'rgba(12,19,31,0.82)',
          border: '1.5px solid ' + (sel ? 'rgb(' + RGB[id] + ')' : 'rgba(150,170,195,0.28)'),
          color: '#eef2f6', cursor: 'pointer', fontFamily: "'Space Grotesk', sans-serif",
          fontSize: isEje ? '17px' : '14px', fontWeight: 600, transition: 'all .25s',
          boxShadow: sel ? ('0 0 0 4px rgba(' + RGB[id] + ',0.14), 0 0 24px rgba(' + RGB[id] + ',0.4)') : 'none',
          outline: 'none', zIndex: sel ? 3 : 2
        }
      };
    });

    const sa = t.actors[selected];
    const sel = {
      name: sa.name, role: sa.role, aporta: sa.aporta, gana: sa.gana, loop: sa.loop,
      aportaLabel: t.aporta, ganaLabel: t.gana,
      dotStyle: { width: '10px', height: '10px', borderRadius: '50%', background: 'rgb(' + RGB[selected] + ')', boxShadow: '0 0 12px rgba(' + RGB[selected] + ',0.7)' }
    };

    return {
      t: t,
      year: '2026',
      nav: fhNavItems(lang, 'modelo'),
      bgCanvas: this.bgCanvas,
      esBtnStyle: isES ? activeBtn : baseBtn,
      enBtnStyle: isES ? baseBtn : activeBtn,
      setES: () => this.setLang('es'),
      setEN: () => this.setLang('en'),
      wheelLinks: this.buildWheelLinks(selected),
      wheelNodes: wheelNodes,
      sel: sel
    };
  }
}
</script>
</body>
</html>
